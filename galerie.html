<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie — Multi'CH Le Havre</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* STYLE DES FILTRES */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0 3rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--white);
            border: 1px solid rgba(26,20,16,.1);
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-pill);
            font-family: var(--f-body);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--stone);
        }

        .filter-btn:hover {
            border-color: var(--rust);
            color: var(--rust);
        }

        .filter-btn.active {
            background: var(--rust);
            color: var(--white);
            border-color: var(--rust);
            box-shadow: 0 4px 15px rgba(192,86,42,0.3);
        }

        /* GRILLE DE GALERIE */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            min-height: 400px;
        }

        .gallery-card {
            border-radius: var(--radius-md);
            overflow: hidden;
            position: relative;
            height: 300px;
            background: var(--sand);
            box-shadow: var(--shadow-sm);
        }

        .gallery-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s var(--ease-out);
        }

        .gallery-card:hover img {
            transform: scale(1.08);
        }

        .gallery-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(255,255,255,0.9);
            padding: 0.3rem 0.8rem;
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--rust);
            z-index: 2;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <nav class="nav">
        <a href="index.html" class="nav-logo">
            <img src="https://multi-ch.github.io/1768680134589.jpg" alt="Logo"> Multi'CH
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="decoration.html">Décoration</a></li>
            <li><a href="bricolage.html">Bricolage</a></li>
            <li><a href="cuisine.html">Cuisines</a></li>
            <li><a href="galerie.html" class="active">Galerie</a></li>
            <li><a href="contact.html" class="nav-cta">Contact</a></li>
        </ul>
        <button class="nav-toggle"><span></span><span></span><span></span></button>
    </nav>
</header>

<div class="nav-mobile">
    <ul class="nav-mobile-links">
        <li><a href="index.html">Accueil</a></li>
        <li><a href="decoration.html">Décoration</a></li>
        <li><a href="bricolage.html">Bricolage</a></li>
        <li><a href="cuisine.html">Cuisines</a></li>
        <li><a href="galerie.html" class="active">Galerie</a></li>
        <li><a href="contact.html" class="nav-mobile-cta">Contact</a></li>
    </ul>
</div>

<section class="hero" style="min-height: 40vh; padding-top: 150px;">
    <div class="container">
        <p class="section-label">Portfolio</p>
        <h1>Galerie <em>Réalisations</em></h1>
        
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterGallery('all', this)">Tous</button>
            <button class="filter-btn" onclick="filterGallery('brico', this)">🔨 Bricolage</button>
            <button class="filter-btn" onclick="filterGallery('cuisine', this)">🍽️ Cuisine</button>
            <button class="filter-btn" onclick="filterGallery('deco', this)">🎨 Décoration</button>
        </div>
    </div>
</section>

<section class="section">
    <div class="container">
        <div class="gallery-grid" id="galleryGrid">
            </div>
    </div>
</section>

<script>
    // Liste des images
    const images = [
        { src: "images/brico1.jpg", cat: "brico", title: "Meuble TV" },
        { src: "images/brico2.jpg", cat: "brico", title: "Étagères" },
        { src: "images/cuisine1.jpg", cat: "cuisine", title: "Cuisine moderne" },
        { src: "images/cuisine2.jpg", cat: "cuisine", title: "Plan de travail" },
        { src: "images/deco1.jpg", cat: "deco", title: "Peinture salon" },
        { src: "images/deco2.jpg", cat: "deco", title: "Papier peint" }
    ];

    function filterGallery(category, btn) {
        // 1. Gérer l'apparence des boutons
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // 2. Filtrer et afficher
        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = '';

        const filtered = category === 'all' ? images : images.filter(img => img.cat === category);

        filtered.forEach(img => {
            const label = img.cat === 'brico' ? '🔨 Brico' : (img.cat === 'cuisine' ? '🍽️ Cuisine' : '🎨 Déco');
            grid.innerHTML += `
                <div class="gallery-card" data-reveal>
                    <div class="gallery-badge">${label}</div>
                    <img src="${img.src}" alt="${img.title}" onerror="this.src='https://picsum.photos/400/300?sig=${Math.random()}'">
                    <div class="gallery-overlay" style="opacity:1; background:none; padding:1rem;">
                        <span style="background:rgba(0,0,0,0.5); padding:0.2rem 0.5rem; border-radius:4px;">${img.title}</span>
                    </div>
                </div>
            `;
        });
        
        // Relancer l'animation reveal
        document.querySelectorAll('[data-reveal]').forEach(el => observer.observe(el));
    }

    // Menu Mobile
    const toggle = document.querySelector('.nav-toggle');
    const mobileMenu = document.querySelector('.nav-mobile');
    toggle.addEventListener('click', () => {
        toggle.classList.toggle('open');
        mobileMenu.classList.toggle('open');
    });

    // Reveal
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });

    // Initialisation
    filterGallery('all', document.querySelector('.filter-btn.active'));
</script>

</body>
</html>
