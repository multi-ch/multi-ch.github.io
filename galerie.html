<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie — Multi'CH Le Havre</title>
    <meta property="og:url" content="https://multich.fr/galerie">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="canonical" href="https://multich.fr/galerie">
    <style>
        /* Styles spécifiques pour l'éclat de la galerie */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .gallery-card {
            position: relative;
            height: 300px;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: var(--sand);
            box-shadow: var(--shadow-sm);
            transition: transform 0.4s ease;
        }
        .gallery-card:hover { transform: translateY(-10px); }
        .gallery-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .gallery-badge {
            position: absolute; top: 15px; left: 15px;
            background: rgba(255,255,255,0.9);
            padding: 5px 12px; border-radius: 50px;
            font-weight: 700; font-size: 0.8rem; color: var(--rust);
            z-index: 2;
        }
        .filter-container {
            display: flex; justify-content: center; gap: 10px;
            margin: 40px 0; flex-wrap: wrap;
        }
        .filter-btn {
            padding: 10px 25px; border-radius: 50px; border: 1px solid var(--rust);
            background: transparent; color: var(--rust); font-weight: 600;
            cursor: pointer; transition: 0.3s;
        }
        .filter-btn.active, .filter-btn:hover {
            background: var(--rust); color: white;
        }
    </style>
</head>
<body>

<header>
    <nav class="nav">
        <a href="/" class="nav-logo">
            <img src="/1768680134589.jpg" alt="Logo"> Multi'CH
        </a>
        <ul class="nav-links">
            <li><a href="/">Accueil</a></li>
            <li><a href="/decoration">Décoration</a></li>
            <li><a href="/revetements-de-sol">Sols</a></li>
            <li><a href="/bricolage">Bricolage</a></li>
            <li><a href="/cuisine">Pose de cuisines</a></li>
            <li><a href="/galerie" class="active">Galerie</a></li>
            <li><a href="/reparations">Réparations locatives</a></li>
            <li><a href="/contact" class="nav-cta">Contact</a></li>
        </ul>
        <button class="nav-toggle"><span></span><span></span><span></span></button>
    </nav>
</header>

<div class="nav-mobile">
    <ul class="nav-mobile-links">
        <li><a href="/">Accueil</a></li>
        <li><a href="/decoration">Décoration</a></li>
        <li><a href="/revetements-de-sol">Sols</a></li>
        <li><a href="/bricolage">Bricolage</a></li>
        <li><a href="/cuisine">Cuisines</a></li>
        <li><a href="/galerie" class="active">Galerie</a></li>
        <li><a href="/reparations">Réparations locatives</a></li>
        <li><a href="/contact" class="nav-mobile-cta">Contact</a></li>
    </ul>
</div>

<section class="hero" style="padding-top: 150px; min-height: auto; padding-bottom: 50px;">
    <div class="container">
        <p class="section-label">Réalisations</p>
        <h1>Galerie <em>Photos</em></h1>
        
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterGallery('all', this)">Tous</button>
            <button class="filter-btn" onclick="filterGallery('brico', this)">🔨 Bricolage</button>
            <button class="filter-btn" onclick="filterGallery('cuisine', this)">🍽️ Cuisine</button>
            <button class="filter-btn" onclick="filterGallery('deco', this)">🎨 Décoration</button>
        </div>
    </div>
</section>

<div class="container" style="margin-bottom: 100px;">
    <div class="gallery-grid" id="galleryGrid">
        </div>
</div>

<script>
    // LISTE DE TOUTES VOS IMAGES RÉELLES
    const myImages = [
        // BRICOLAGE (1 à 7)
        { src: "images/brico1.jpg", cat: "brico", title: "Travaux de bricolage" },
        { src: "images/brico2.jpg", cat: "brico", title: "Réparation technique" },
        { src: "images/brico3.jpg", cat: "brico", title: "Installation" },
        { src: "images/brico4.jpg", cat: "brico", title: "Montage" },
        { src: "images/brico5.jpg", cat: "brico", title: "Ajustements" },
        { src: "images/brico6.jpg", cat: "brico", title: "Finitions" },
        { src: "images/brico7.jpg", cat: "brico", title: "Service bricolage" },
        // CUISINE (1 à 8)
        { src: "images/cuisine1.jpg", cat: "cuisine", title: "Pose de cuisine" },
        { src: "images/cuisine2.jpg", cat: "cuisine", title: "Installation éléments" },
        { src: "images/cuisine3.jpg", cat: "cuisine", title: "Plan de travail" },
        { src: "images/cuisine4.jpg", cat: "cuisine", title: "Électroménager" },
        { src: "images/cuisine5.jpg", cat: "cuisine", title: "Aménagement cuisine" },
        { src: "images/cuisine6.jpg", cat: "cuisine", title: "Cuisine équipée" },
        { src: "images/cuisine7.jpg", cat: "cuisine", title: "Rénovation cuisine" },
        { src: "images/cuisine8.jpg", cat: "cuisine", title: "Finition cuisine" },
        // DECORATION (1 à 6)
        { src: "images/deco1.jpg", cat: "deco", title: "Peinture murale" },
        { src: "images/deco2.jpg", cat: "deco", title: "Décoration intérieure" },
        { src: "images/deco3.jpg", cat: "deco", title: "Papier peint" },
        { src: "images/deco4.jpg", cat: "deco", title: "Revêtement" },
        { src: "images/deco5.jpg", cat: "deco", title: "Peinture plafonds" },
        { src: "images/deco6.jpg", cat: "deco", title: "Ambiance déco" }
    ];

    function filterGallery(category, btn) {
        // Gérer les boutons
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = '';

        const filtered = category === 'all' ? myImages : myImages.filter(img => img.cat === category);

        filtered.forEach(img => {
            const emoji = img.cat === 'brico' ? '🔨' : (img.cat === 'cuisine' ? '🍽️' : '🎨');
            grid.innerHTML += `
                <div class="gallery-card" data-reveal>
                    <div class="gallery-badge">${emoji} ${img.cat.toUpperCase()}</div>
                    <img src="${img.src}" alt="${img.title}" onerror="this.src='https://picsum.photos/400/300?sig=${Math.random()}'">
                </div>
            `;
        });
        
        // Relancer l'animation reveal
        document.querySelectorAll('[data-reveal]').forEach(el => observer.observe(el));
    }

    // Menu Mobile
    const toggle = document.querySelector('.nav-toggle');
    const mobileMenu = document.querySelector('.nav-mobile');
    toggle.addEventListener('click', () => {
        toggle.classList.toggle('open');
        mobileMenu.classList.toggle('open');
        document.body.classList.toggle('nav-open');
    });

    // Reveal Animation
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });

    // Lancer au démarrage
    filterGallery('all', document.querySelector('.filter-btn.active'));
</script>

</body>
</html>
